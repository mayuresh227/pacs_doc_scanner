name: pacs_doc_scanner
description: PACS Document Scanner - Scan, preview, edit and export documents as PDF
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  image_picker: ^1.0.7
  image: ^4.8.0
  pdf: ^3.10.8
  share_plus: ^7.2.2
  permission_handler: ^11.2.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
